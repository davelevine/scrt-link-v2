<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 118" role="img" aria-label="Anatomy of a secret link: the domain identifies the service, while the secret ID and encryption key live in the URL fragment that is never sent to the server.">
	<defs>
		<style>
			.ue-url {
				font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;
				font-size: 22px;
				font-weight: 700;
			}
			.ue-base {
				fill: currentColor;
			}
			.ue-key {
				fill: var(--color-accent);
			}
			.ue-label {
				font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
				font-size: 17px;
			}
			.ue-label-base {
				fill: currentColor;
				opacity: 0.7;
			}
			.ue-label-key {
				fill: var(--color-accent);
			}
			.ue-brace {
				fill: none;
				stroke: currentColor;
				stroke-opacity: 0.4;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.ue-brace-key {
				fill: none;
				stroke: var(--color-accent);
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
		</style>
	</defs>

	<!-- The secret link. Monospace + textLength lock each segment's width so the
	     braces align exactly with the `s` / `#` boundary. The full key is shown
	     (no truncation). Domain 27 chars, fragment 26 chars @ 13.2px advance. -->
	<text class="ue-url" y="42">
		<tspan class="ue-base" x="30" textLength="356" lengthAdjust="spacingAndGlyphs"
			>https://secrets.levine.io/s</tspan
		><tspan class="ue-key" textLength="343" lengthAdjust="spacingAndGlyphs"
			>#Djw7Kp2LmQ4vTnB8sR3xZ6yH</tspan
		>
	</text>

	<!-- Curly brace + label under the domain (x 30 → 386, boundary at s/#) -->
	<path
		class="ue-brace"
		d="M30,56 Q30,66 41,66 L197,66 Q208,66 208,75 Q208,66 219,66 L375,66 Q386,66 386,56"
	/>
	<text class="ue-label ue-label-base" x="208" y="95" text-anchor="middle">Domain</text>

	<!-- Curly brace + label under the secret ID / encryption key fragment (x 386 → 729) -->
	<path
		class="ue-brace-key"
		d="M386,56 Q386,66 397,66 L546,66 Q557,66 557,75 Q557,66 568,66 L718,66 Q729,66 729,56"
	/>
	<text class="ue-label ue-label-key" x="557" y="95" text-anchor="middle">
		Secret ID / Encryption Key
	</text>
</svg>
