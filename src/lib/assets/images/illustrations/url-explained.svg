<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="18 2 646 108" role="img" aria-label="Anatomy of a secret link https://secrets.levine.io/s#… : the domain identifies the service, while the Secret ID and encryption key live in the URL fragment after the # and are never sent to the server.">
	<defs>
		<style>
			.ue-url {
				font-family: ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;
				font-size: 27px;
				font-weight: 700;
			}
			/* Decorative illustration — never selectable/interactive (the original
			   was baked vector paths; this keeps the same behaviour with real text). */
			.ue-url,
			.ue-label {
				-webkit-user-select: none;
				-moz-user-select: none;
				user-select: none;
				pointer-events: none;
			}
			.ue-base {
				fill: currentColor;
			}
			.ue-key {
				fill: var(--color-accent);
			}
			.ue-label {
				font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
				font-size: 22px;
			}
			.ue-label-base {
				fill: currentColor;
				opacity: 0.7;
			}
			.ue-label-key {
				fill: var(--color-accent);
			}
			.ue-brace {
				fill: none;
				stroke: currentColor;
				stroke-opacity: 0.4;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.ue-brace-key {
				fill: none;
				stroke: var(--color-accent);
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
		</style>
	</defs>

	<!-- Full secret link, monospace @ 12px advance. Three locked segments:
	     domain (26 chars, x 28→340) · the `s#` connector (2 chars, x 340→364,
	     deliberately left OUTSIDE both braces) · the key (24 chars, x 364→652). -->
	<text class="ue-url" y="38">
		<tspan class="ue-base" x="28" textLength="312" lengthAdjust="spacingAndGlyphs"
			>https://secrets.levine.io/</tspan
		><tspan class="ue-base" textLength="24" lengthAdjust="spacingAndGlyphs">s#</tspan
		><tspan class="ue-key" textLength="288" lengthAdjust="spacingAndGlyphs"
			>Djw7Kp2LmQ4vTnB8sR3xZ6yH</tspan
		>
	</text>

	<!-- Curly brace + label under the domain only (x 28 → 340) -->
	<path
		class="ue-brace"
		d="M28,52 Q28,62 39,62 L173,62 Q184,62 184,71 Q184,62 195,62 L329,62 Q340,62 340,52"
	/>
	<text class="ue-label ue-label-base" x="184" y="93" text-anchor="middle">Domain</text>

	<!-- Curly brace + label under the key only (x 364 → 652); the `s#` between the
	     two braces is intentionally un-bracketed, matching the original. -->
	<path
		class="ue-brace-key"
		d="M364,52 Q364,62 375,62 L497,62 Q508,62 508,71 Q508,62 519,62 L641,62 Q652,62 652,52"
	/>
	<text class="ue-label ue-label-key" x="508" y="93" text-anchor="middle">
		Secret ID / Encryption Key
	</text>
</svg>
