<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 710 125" role="img" aria-label="Anatomy of a secret link: the domain identifies the service, while the secret ID and encryption key live in the URL fragment that is never sent to the server.">
	<defs>
		<style>
			.ue-url {
				font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
				font-size: 30px;
				font-weight: 700;
			}
			.ue-base {
				fill: currentColor;
			}
			.ue-key {
				fill: var(--color-accent);
			}
			.ue-label {
				font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
				font-size: 17px;
			}
			.ue-label-base {
				fill: currentColor;
				opacity: 0.7;
			}
			.ue-label-key {
				fill: var(--color-accent);
			}
			.ue-brace {
				fill: none;
				stroke: currentColor;
				stroke-opacity: 0.4;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.ue-brace-key {
				fill: none;
				stroke: var(--color-accent);
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
		</style>
	</defs>

	<!-- The secret link. textLength forces exact segment widths so the braces below align. -->
	<text class="ue-url" y="44">
		<tspan class="ue-base" x="50" textLength="360" lengthAdjust="spacingAndGlyphs"
			>https://secrets.levine.io/s</tspan
		><tspan class="ue-key" textLength="250" lengthAdjust="spacingAndGlyphs">#Xy7k2p9wLqZ…</tspan>
	</text>

	<!-- Curly brace + label under the domain -->
	<path
		class="ue-brace"
		d="M50,60 Q50,70 61,70 L219,70 Q230,70 230,79 Q230,70 241,70 L399,70 Q410,70 410,60"
	/>
	<text class="ue-label ue-label-base" x="230" y="99" text-anchor="middle">Domain</text>

	<!-- Curly brace + label under the secret ID / encryption key fragment -->
	<path
		class="ue-brace-key"
		d="M410,60 Q410,70 421,70 L524,70 Q535,70 535,79 Q535,70 546,70 L649,70 Q660,70 660,60"
	/>
	<text class="ue-label ue-label-key" x="535" y="99" text-anchor="middle">
		Secret ID / Encryption Key
	</text>
</svg>
