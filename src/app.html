<!doctype html>
<!-- Dark is the default theme. Rendering `.dark` on <html> server-side means the
     very first paint already uses the dark palette (app.css `.dark` background),
     so there is no white/cream flash before mode-watcher's client script runs.
     mode-watcher reconciles this on mount (removing `.dark` only if the visitor
     has explicitly chosen light). -->
<html lang="%lang%" class="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Paint the dark background before app CSS loads, as a belt-and-suspenders
		     backstop to the `.dark` class above. Matches `.dark --background`. -->
		<style>
			:root {
				color-scheme: dark;
			}
			html {
				background-color: hsl(218 43% 8%);
			}
		</style>
		%THEME_CSS% %sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
