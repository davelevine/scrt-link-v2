<!doctype html>
<html lang="%lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Dark is the default theme. Paint the dark background immediately (before
		     app CSS / mode-watcher run) so there is no white flash on first load.
		     Matches the `.dark` `--background` in app.css. -->
		<style>
			:root {
				color-scheme: dark;
			}
			html {
				background-color: hsl(218 43% 8%);
			}
		</style>
		%THEME_CSS% %sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-screen">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
